<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Workaround for iframe sandboxes where window.fetch has only a getter
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            let currentFetch = originalFetch;
            Object.defineProperty(window, 'fetch', {
              get() { return currentFetch; },
              set(value) { currentFetch = value; },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Could not patch window.fetch setter:", e);
        }
      })();
    </script>
    <title>Smart Notes</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
